<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spare Parts Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-200">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-slate-800">Spare Parts Dashboard</h1>
                    <p class="text-slate-500 text-sm md:text-base">ตรวจสอบข้อมูลอะไหล่ RAW_SPARE_DATA</p>
                </div>
            </div>
            <div id="stats" class="bg-white px-6 py-3 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-3">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <div>
                    <span class="block text-[10px] text-slate-400 uppercase font-bold tracking-wider">Total Items</span>
                    <span id="total-count" class="text-2xl font-bold text-slate-800">0</span>
                </div>
            </div>
        </div>

        <!-- Filters Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <!-- Machine Filter -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <label class="flex items-center gap-2 text-sm font-semibold text-slate-600 mb-3">
                    กรองตามเครื่องจักร (Machine)
                </label>
                <select id="machine-filter" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="">ทั้งหมด (Show All)</option>
                </select>
            </div>
            <!-- Type Search -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <label class="flex items-center gap-2 text-sm font-semibold text-slate-600 mb-3">
                    ค้นหาตามชื่อ/รุ่น (Type)
                </label>
                <input type="text" id="type-search" placeholder="พิมพ์เพื่อค้นหา..." 
                    class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="flex flex-col items-center justify-center py-24">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-14 w-14 mb-4"></div>
            <h2 class="text-center text-slate-400 font-medium italic">กำลังเชื่อมต่อข้อมูลจาก Google Sheets...</h2>
            <p class="text-xs text-slate-400 mt-2">(หากค้างนานเกินไป โปรดตรวจสอบการตั้งค่า Publish to Web)</p>
        </div>

        <!-- Desktop View -->
        <div class="hidden md:block overflow-x-auto bg-white shadow-xl shadow-slate-200/50 border border-slate-200 rounded-2xl">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr id="table-header"></tr>
                </thead>
                <tbody id="table-body" class="bg-white divide-y divide-slate-100"></tbody>
            </table>
        </div>

        <!-- Mobile View -->
        <div id="mobile-view" class="md:hidden space-y-4"></div>

        <!-- Error/No Data -->
        <div id="no-data" class="hidden py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200">
            <p id="error-message" class="text-slate-400 font-medium text-lg">ไม่พบข้อมูลที่ตรงกับเงื่อนไข</p>
            <button onclick="location.reload()" class="mt-4 text-blue-600 font-semibold hover:underline">ลองโหลดใหม่อีกครั้ง</button>
        </div>
    </div>

    <script>
        /**
         * สำคัญ: เปลี่ยน URL ตรงนี้เป็นลิงก์ที่ได้จาก "Publish to the web" 
         * และเลือกรูปแบบเป็น "Comma-separated values (.csv)"
         */
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS1D6D7f4mHkFp4oE0C9B6g_S_Z0E_V_D_EXAMPLE_URL/pub?output=csv'; 
        
        // หากต้องการใช้ลิงก์เดิมที่คุณส่งมา (แบบ Export) ต้องมั่นใจว่าแชร์แบบ Anyone with link can view
        const FALLBACK_URL = 'https://docs.google.com/spreadsheets/d/1plzDBcz-b6oqHe9f31CrbeoFnWt0XtFH-xsbEqVPVjc/export?format=csv&gid=0';

        let rawData = [];

        async function loadData() {
            // ลองโหลดจาก URL หลักก่อน ถ้าไม่ได้ให้ใช้ลิงก์สำรอง
            const targetUrl = SHEET_CSV_URL.includes('EXAMPLE') ? FALLBACK_URL : SHEET_CSV_URL;

            Papa.parse(targetUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        rawData = results.data.filter(row => Object.values(row).some(v => v !== ""));
                        initDashboard();
                    } else {
                        showError("ข้อมูลว่างเปล่า หรือรูปแบบไฟล์ไม่ถูกต้อง");
                    }
                },
                error: function(err) {
                    showError("ไม่สามารถเข้าถึงไฟล์ได้: โปรดตั้งค่า 'เผยแพร่ไปยังเว็บ' ใน Google Sheets");
                }
            });
        }

        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('no-data').classList.remove('hidden');
            document.getElementById('error-message').textContent = msg;
        }

        function initDashboard() {
            document.getElementById('loading').classList.add('hidden');
            
            // สร้าง Filter สำหรับ Machine
            const machines = [...new Set(rawData.map(item => item.Machine))].filter(Boolean).sort();
            const machineFilter = document.getElementById('machine-filter');
            machines.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                machineFilter.appendChild(opt);
            });

            // สร้างหัวตาราง
            const keys = Object.keys(rawData[0]);
            const headerRow = document.getElementById('table-header');
            keys.forEach(key => {
                const th = document.createElement('th');
                th.className = "px-6 py-4 text-left text-[11px] font-bold text-slate-400 uppercase tracking-widest";
                th.textContent = key;
                headerRow.appendChild(th);
            });

            renderData(rawData);

            // Listeners
            document.getElementById('machine-filter').addEventListener('change', filterData);
            document.getElementById('type-search').addEventListener('input', filterData);
        }

        function filterData() {
            const mVal = document.getElementById('machine-filter').value.toLowerCase();
            const tVal = document.getElementById('type-search').value.toLowerCase();

            const filtered = rawData.filter(item => {
                const matchM = !mVal || (item.Machine && item.Machine.toLowerCase() === mVal);
                const matchT = !tVal || (item.Type && item.Type.toLowerCase().includes(tVal));
                return matchM && matchT;
            });

            renderData(filtered);
        }

        function renderData(data) {
            const tBody = document.getElementById('table-body');
            const mBody = document.getElementById('mobile-view');
            tBody.innerHTML = '';
            mBody.innerHTML = '';
            document.getElementById('total-count').textContent = data.length;

            if (data.length === 0) {
                document.getElementById('no-data').classList.remove('hidden');
                return;
            }
            document.getElementById('no-data').classList.add('hidden');

            const keys = Object.keys(data[0]);

            data.forEach(row => {
                // Table Row (Desktop)
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                keys.forEach(key => {
                    const td = document.createElement('td');
                    td.className = "px-6 py-4 whitespace-nowrap text-sm text-slate-600 border-b border-slate-100";
                    td.textContent = row[key] || '-';
                    tr.appendChild(td);
                });
                tBody.appendChild(tr);

                // Card (Mobile)
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-200";
                
                let cardHtml = `
                    <div class="mb-3 border-b border-slate-50 pb-2">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-bold text-blue-500 uppercase">${row.Machine || 'No Machine'}</span>
                            <span class="text-[10px] text-slate-400">${row.Station || '-'}</span>
                        </div>
                        <h3 class="font-bold text-slate-800">${row.Type || 'Unknown Type'}</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-y-2">
                `;

                keys.forEach(key => {
                    if(!['Machine', 'Type', 'Station'].includes(key)) {
                        cardHtml += `
                            <div class="flex flex-col">
                                <span class="text-[9px] text-slate-400 uppercase font-bold">${key}</span>
                                <span class="text-xs text-slate-700 font-medium">${row[key] || '-'}</span>
                            </div>
                        `;
                    }
                });

                cardHtml += `</div>`;
                card.innerHTML = cardHtml;
                mBody.appendChild(card);
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
